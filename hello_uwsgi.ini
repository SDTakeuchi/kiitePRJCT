# uwsgi.ini
[uwsgi]

# Django-related settings
# the base directory (full path)
chdir           = /home/ubuntu/django/hellokiite
# Django's wsgi file
module          = kiite_me.wsgi:application
# the virtualenv (full path)
home            = /home/ubuntu/django/myprojectenv

# process-related settings
# master
master          = true
# maximum number of worker processes
processes       = 10
# the socket (use the full path to be safe
socket          = /home/ubuntu/django/hellokiite/mysite.sock
# ... with appropriate permissions - may be needed
chmod-socket    = 666
# clear environment on exit
vacuum          = true

daemonize = /var/log/uwsgi/uwsgikiite.log
log-reopen = true
log-maxsize = 8000000
logfile-chown = on
logfile-chmod = 644

# directs where pid file is stored
pidfile = /tmp/uwsgi.pid

# stop command
# uwsgi --stop /tmp/uwsgi.pid

# reload command
# uwsgi --reload /tmp/uwsgi.pid
